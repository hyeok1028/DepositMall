services:
  localdb:
    container_name: hanaro-db
    image: mysql:8.0
    ports:
      - "3308:3306"
#    expose:
#      - 3308
    environment:
      MYSQL_ROOT_PASSWORD: '12345678'
      MYSQL_DATABASE: hanarodb
      MYSQL_USER: hanaro
      MYSQL_PASSWORD: '12345678'
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_ft_min_token_size=2
      - --log_bin_trust_function_creators=1
#      - --innodb_ft_server_stopword_table=hanarodb/StopWord

    volumes:
      - ./mysql:/var/lib/mysql
